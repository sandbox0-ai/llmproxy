name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: registry.digitalocean.com/langyishipit/llmproxy
  KUBE_NAMESPACE: sandbox0-cloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.IMAGE_REPOSITORY }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.DO_KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 0600 "$HOME/.kube/config"

      - name: Deploy
        run: |
          kubectl apply -f deploy/k8s.yaml
          kubectl -n "$KUBE_NAMESPACE" set image deployment/llmproxy llmproxy="${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          kubectl -n "$KUBE_NAMESPACE" rollout status deployment/llmproxy --timeout=180s
