apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmproxy
  namespace: sandbox0-cloud
  labels:
    app.kubernetes.io/name: llmproxy
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: llmproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llmproxy
        app.kubernetes.io/component: proxy
    spec:
      imagePullSecrets:
        - name: registry-langyishipit
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llmproxy
          image: registry.digitalocean.com/langyishipit/llmproxy:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: llmproxy
  namespace: sandbox0-cloud
  labels:
    app.kubernetes.io/name: llmproxy
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llmproxy
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llmproxy
  namespace: sandbox0-cloud
  labels:
    app.kubernetes.io/name: llmproxy
    app.kubernetes.io/component: proxy
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: llmproxy.sandbox0.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmproxy
                port:
                  number: 80
  tls:
    - hosts:
        - llmproxy.sandbox0.ai
      secretName: sandbox0-ai-wildcard-tls
